<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneAgent - 手机自动化代理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .history-table th {
            background: #f5f7fa;
            color: #333;
            font-weight: 600;
        }
        
        .history-table tr:hover {
            background: #f9f9f9;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .result-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 PhoneAgent</h1>
            <p>AI 驱动的手机自动化代理系统</p>
            <div id="deviceStatus" style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 8px;">
                <strong>🔌 设备状态：</strong> <span id="deviceCount">检测中...</span>
                <button onclick="showDeviceManager()" style="margin-left: 10px; padding: 5px 15px; background: white; color: #667eea; border: none; border-radius: 5px; cursor: pointer;">📱 管理设备</button>
            </div>
        </div>
        
        <!-- 设备管理器模态框 -->
        <div id="deviceModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
                <h2 style="color: #667eea; margin-bottom: 20px;">📱 设备管理</h2>
                    
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="deviceAddress" placeholder="输入设备地址 (如：192.168.1.100:5555)" style="flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px;">
                        <button onclick="connectDevice()" class="btn" style="padding: 10px 20px;">连接</button>
                    </div>
                    <button onclick="refreshDevices()" class="btn" style="width: 100%; padding: 10px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333;">🔄 刷新设备列表</button>
                </div>
                    
                <div id="deviceList" style="border: 1px solid #e0e0e0; border-radius: 6px; min-height: 200px;">
                    <div style="padding: 40px; text-align: center; color: #999;">加载中...</div>
                </div>
                    
                <button onclick="closeDeviceManager()" style="margin-top: 20px; width: 100%; padding: 12px; background: #f44336; color: white; border: none; border-radius: 6px; cursor: pointer;">关闭</button>
            </div>
        </div>
            
        <!-- 任务执行卡片 -->
        <div class="card">
            <h2>🚀 执行任务</h2>
            
            <div id="messageArea"></div>
            
            <div class="form-group">
                <label for="taskInput">任务描述</label>
                <textarea 
                    id="taskInput" 
                    class="form-control" 
                    placeholder="请输入要执行的任务，例如：打开微信并给张三发消息：晚上好"
                ></textarea>
            </div>
            
            <button id="executeBtn" class="btn" onclick="executeTask()">
                执行任务
            </button>
            
            <div id="resultArea" class="result-box" style="display: none;">
                <div class="result-title">执行结果:</div>
                <div id="resultContent"></div>
            </div>
        </div>
        
        <!-- 统计信息卡片 -->
        <div class="card">
            <h2>📊 统计信息</h2>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="totalTasks">-</div>
                    <div class="stat-label">总任务数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="successRate">-</div>
                    <div class="stat-label">成功率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgSteps">-</div>
                    <div class="stat-label">平均步数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgDuration">-</div>
                    <div class="stat-label">平均耗时 (秒)</div>
                </div>
            </div>
            <button class="btn" onclick="loadStats()" style="margin-top: 10px;">
                🔄 刷新统计
            </button>
        </div>
        
        <!-- 历史记录卡片 -->
        <div class="card">
            <h2>📜 历史记录</h2>
            <div style="margin-bottom: 15px;">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="form-control" 
                    placeholder="搜索关键词..."
                    style="display: inline-block; width: 300px; margin-right: 10px;"
                >
                <button class="btn" onclick="searchHistory()" style="padding: 10px 20px;">
                    🔍 搜索
                </button>
                <button class="btn" onclick="loadHistory()" style="padding: 10px 20px; margin-left: 10px;">
                    🔄 刷新
                </button>
                <button class="btn" onclick="clearHistory()" style="padding: 10px 20px; margin-left: 10px; background: linear-gradient(135deg, #ff7b7b 0%, #ff4848 100%);">
                    🗑️ 清除历史
                </button>
            </div>
            
            <table class="history-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>任务</th>
                        <th>结果</th>
                        <th>步数</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #999;">
                            暂无历史记录
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        
        // 显示消息
        function showMessage(message, isError = false) {
            const messageArea = document.getElementById('messageArea');
            messageArea.innerHTML = `
                <div class="alert ${isError ? 'alert-error' : 'alert-info'}">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }
        
        // 执行任务
        async function executeTask() {
            const taskInput = document.getElementById('taskInput');
            const task = taskInput.value.trim();
            
            if (!task) {
                showMessage('请输入任务描述', true);
                return;
            }
            
            const executeBtn = document.getElementById('executeBtn');
            executeBtn.disabled = true;
            executeBtn.innerHTML = '<span class="loading"></span>执行中...';
            
            try {
                const response = await fetch(`${API_BASE}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ task })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('resultContent').textContent = data.result;
                    document.getElementById('resultArea').style.display = 'block';
                    showMessage(`任务执行成功！步数：${data.steps}`);
                    loadHistory();
                    loadStats();
                } else {
                    showMessage(data.error || '任务执行失败', true);
                }
            } catch (error) {
                showMessage(`请求失败：${error.message}`, true);
            } finally {
                executeBtn.disabled = false;
                executeBtn.innerHTML = '执行任务';
            }
        }
        
        // 加载统计信息
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/history/stats`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.statistics;
                    document.getElementById('totalTasks').textContent = stats.total_tasks;
                    document.getElementById('successRate').textContent = 
                        `${stats.success_rate.toFixed(1)}%`;
                    document.getElementById('avgSteps').textContent = stats.average_steps;
                    document.getElementById('avgDuration').textContent = 
                        stats.average_duration_seconds.toFixed(1);
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history?limit=20`);
                const data = await response.json();
                
                if (data.success) {
                    renderHistory(data.records);
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }
        
        // 搜索历史
        async function searchHistory() {
            const keyword = document.getElementById('searchInput').value.trim();
            
            if (!keyword) {
                loadHistory();
                return;
            }
            
            try {
                const response = await fetch(
                    `${API_BASE}/history/search?keyword=${encodeURIComponent(keyword)}`
                );
                const data = await response.json();
                
                if (data.success) {
                    renderHistory(data.records);
                }
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }
        
        // 渲染历史记录
        function renderHistory(records) {
            const tbody = document.getElementById('historyTableBody');
            
            if (!records || records.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; color: #999;">
                            暂无历史记录
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.id}</td>
                    <td>${escapeHtml(record.task)}</td>
                    <td>${escapeHtml(record.result)}</td>
                    <td>${record.steps}</td>
                    <td>
                        <span class="status-badge ${record.success ? 'status-success' : 'status-failed'}">
                            ${record.success ? '成功' : '失败'}
                        </span>
                    </td>
                    <td>${formatTime(record.created_at)}</td>
                </tr>
            `).join('');
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadHistory();
            updateDeviceStatus();
            // 每 10 秒自动刷新设备状态
            setInterval(updateDeviceStatus, 10000);
        });
        
        // ========== 设备管理功能 ==========
        
        // 更新设备状态
        async function updateDeviceStatus() {
            try {
                const response = await fetch(`${API_BASE}/devices`);
                const data = await response.json();
                
                if (data.success) {
                    const count = data.count;
                    document.getElementById('deviceCount').textContent = 
                        count === 0 ? '未连接设备' : 
                        `${count} 台设备已连接`;
                    document.getElementById('deviceCount').style.color = 
                        count === 0 ? '#ffcc80' : '#a5d6a7';
                } else {
                    document.getElementById('deviceCount').textContent = '获取失败';
                }
            } catch (error) {
                console.error('获取设备状态失败:', error);
                document.getElementById('deviceCount').textContent = '无法连接';
            }
        }
        
        // 显示设备管理器
        function showDeviceManager() {
            document.getElementById('deviceModal').style.display = 'block';
            refreshDevices();
        }
        
        // 关闭设备管理器
        function closeDeviceManager() {
            document.getElementById('deviceModal').style.display = 'none';
        }
        
        // 刷新设备列表
        async function refreshDevices() {
            const deviceList = document.getElementById('deviceList');
            deviceList.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/devices/refresh`);
                const data = await response.json();
                
                if (data.success && data.devices && data.devices.length > 0) {
                    deviceList.innerHTML = data.devices.map(device => `
                        <div style="padding: 15px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold; color: #333;">${escapeHtml(device.device_id)}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 5px;">
                                    📊 ${device.status} | 🔌 ${device.connection_type} | 📱 ${device.model}
                                </div>
                            </div>
                            ${device.connection_type === 'remote' || device.connection_type === 'wifi' ? `
                                <button onclick="disconnectDevice('${device.device_id}')" style="padding: 8px 15px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer;">断开</button>
                            ` : `
                                <span style="color: #999; font-size: 12px;">USB 设备</span>
                            `}
                        </div>
                    `).join('');
                } else {
                    deviceList.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: #999;">
                            📱 暂无设备连接<br><br>
                            <small>提示：可以通过 USB 连接设备，或使用 ADB 无线连接<br>
                            有线连接后请刷新列表，或点击上方连接按钮添加远程设备</small>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('刷新设备列表失败:', error);
                deviceList.innerHTML = '<div style="padding: 40px; text-align: center; color: #f44336;">加载失败，请重试</div>';
            }
        }
        
        // 连接设备
        async function connectDevice() {
            const addressInput = document.getElementById('deviceAddress');
            const address = addressInput.value.trim();
            
            if (!address) {
                alert('请输入设备地址');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/devices/connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ ${data.message}`);
                    addressInput.value = '';
                    refreshDevices();
                    updateDeviceStatus();
                } else {
                    showMessage(`❌ ${data.message}`, true);
                }
            } catch (error) {
                showMessage(`连接失败：${error.message}`, true);
            }
        }
        
        // 断开设备
        async function disconnectDevice(address) {
            if (!confirm(`确定要断开设备 ${address} 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/devices/disconnect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ ${data.message}`);
                    refreshDevices();
                    updateDeviceStatus();
                } else {
                    showMessage(`❌ ${data.message}`, true);
                }
            } catch (error) {
                showMessage(`断开失败：${error.message}`, true);
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('deviceModal').addEventListener('click', (e) => {
            if (e.target.id === 'deviceModal') {
                closeDeviceManager();
            }
        });

        // 清除历史记录功能
        async function clearHistory() {
            if (!confirm('确定要清除所有历史记录吗？此操作不可撤销！')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/history/clear`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ 历史记录已清除');
                    loadHistory(); // 重新加载历史记录（显示为空）
                    loadStats();    // 重新加载统计数据
                } else {
                    showMessage(`❌ 清除历史记录失败: ${data.error}`, true);
                }
            } catch (error) {
                showMessage(`清除历史记录请求失败: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
